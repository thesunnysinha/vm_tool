- name: Ensure project directory exists
  file:
    path: "{{ project_dest_dir }}"
    state: directory
    mode: '0755'

- name: Copy project files to target using rsync
  synchronize:
    src: "{{ SOURCE_PATH }}/"
    dest: "{{ project_dest_dir }}/"
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=.env"
    delete: false
    recursive: yes
  when: DEPLOY_MODE | default('push') == 'push'
  ignore_errors: yes
  register: rsync_result

- name: Fallback - copy Docker Compose file if rsync unavailable
  copy:
    src: "{{ SOURCE_PATH }}/{{ DOCKER_COMPOSE_FILE_PATH }}"
    dest: "{{ project_dest_dir }}/{{ DOCKER_COMPOSE_FILE_PATH }}"
  when: rsync_result is failed or rsync_result is skipped

# Handle dynamic dependencies (env files, bind-mount volumes detected from compose)
- name: Ensure parent directories for dependencies exist
  file:
    path: "{{ project_dest_dir }}/{{ item.dest | dirname }}"
    state: directory
    mode: '0755'
  loop: "{{ FILES_TO_COPY | default([]) }}"
  when: FILES_TO_COPY is defined and (item.dest | dirname) != ''

- name: Clean up conflicting directories before copy
  shell: |
    target="{{ project_dest_dir }}/{{ item.dest }}"
    if [ -d "$target" ]; then
      rm -rf "$target"
      echo "removed_directory"
    fi
  loop: "{{ FILES_TO_COPY | default([]) }}"
  register: dir_cleanup
  changed_when: "'removed_directory' in dir_cleanup.stdout"
  when: FILES_TO_COPY is defined

- name: Copy dependency files
  copy:
    src: "{{ SOURCE_PATH }}/{{ item.src }}"
    dest: "{{ project_dest_dir }}/{{ item.dest }}"
  loop: "{{ FILES_TO_COPY | default([]) }}"
  when: FILES_TO_COPY is defined

# Backward compatibility for single env file passed via --env-file
- name: Ensure Env file parent directory exists
  file:
    path: "{{ project_dest_dir }}/{{ ENV_FILE_PATH | default('.env') | dirname }}"
    state: directory
    mode: '0755'
  when: FILES_TO_COPY is not defined and ENV_FILE_PATH is defined and (ENV_FILE_PATH | dirname) != ''

- name: Copy Env file
  copy:
    src: "{{ SOURCE_PATH }}/{{ ENV_FILE_PATH | default('.env') }}"
    dest: "{{ project_dest_dir }}/{{ ENV_FILE_PATH | default('.env') }}"
  when: FILES_TO_COPY is not defined
  failed_when: false

- name: Deploy application
  shell: "{{ DEPLOY_COMMAND | default('docker-compose up -d --remove-orphans') }}"
  args:
    chdir: "{{ project_dest_dir }}"
  environment:
    GITHUB_REPOSITORY_OWNER: "{{ GITHUB_REPOSITORY_OWNER | default('') }}"
