---
- name: Deploy to Kubernetes
  hosts: all
  become: false
  vars:
    deploy_method: "{{ deploy_method | default('manifest') }}"
    k8s_namespace: "{{ k8s_namespace | default('default') }}"
    k8s_manifest: "{{ k8s_manifest | default('') }}"
    helm_chart: "{{ helm_chart | default('') }}"
    helm_release: "{{ helm_release | default('') }}"
    helm_values: "{{ helm_values | default('') }}"
    kubeconfig_path: "{{ kubeconfig_path | default('~/.kube/config') }}"
    rollout_timeout: "{{ rollout_timeout | default('300s') }}"
    dry_run: "{{ dry_run | default(false) }}"
    k8s_generic_secrets: "{{ k8s_generic_secrets | default([]) }}"
    k8s_registry_secrets: "{{ k8s_registry_secrets | default([]) }}"

  tasks:
    - name: Verify kubectl is available
      command: kubectl version --client
      register: kubectl_version
      changed_when: false

    - name: Verify cluster connectivity
      command: kubectl --kubeconfig {{ kubeconfig_path }} cluster-info
      register: cluster_info
      changed_when: false

    - name: Ensure namespace exists
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        create namespace {{ k8s_namespace }}
        --dry-run=client -o yaml
      register: ns_yaml
      changed_when: false

    - name: Apply namespace
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        apply -f -
      args:
        stdin: "{{ ns_yaml.stdout }}"
      when: k8s_namespace != 'default' and not dry_run
      changed_when: true

    # --- Sync generic secrets ---
    - name: Sync generic secrets
      shell: |
        printf '%s' '{{ item.data }}' | \
        kubectl --kubeconfig {{ kubeconfig_path }} \
          create secret generic {{ item.name }} \
          --namespace {{ k8s_namespace }} \
          --from-env-file=/dev/stdin \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
      loop: "{{ k8s_generic_secrets }}"
      when: k8s_generic_secrets | length > 0 and not dry_run
      changed_when: true
      no_log: true

    - name: Show secrets that would be synced (dry-run)
      debug:
        msg: "Would sync generic secret: {{ item.name }}"
      loop: "{{ k8s_generic_secrets }}"
      when: k8s_generic_secrets | length > 0 and dry_run

    # --- Sync docker-registry pull secrets ---
    - name: Sync registry pull secrets
      shell: |
        kubectl --kubeconfig {{ kubeconfig_path }} \
          create secret docker-registry {{ item.name }} \
          --namespace {{ k8s_namespace }} \
          --docker-server={{ item.server }} \
          --docker-username={{ item.username }} \
          --docker-password={{ item.password }} \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
      loop: "{{ k8s_registry_secrets }}"
      when: k8s_registry_secrets | length > 0 and not dry_run
      changed_when: true
      no_log: true

    - name: Show registry secrets that would be synced (dry-run)
      debug:
        msg: "Would sync registry secret: {{ item.name }} (server: {{ item.server }})"
      loop: "{{ k8s_registry_secrets }}"
      when: k8s_registry_secrets | length > 0 and dry_run

    # --- Manifest deployment ---
    - name: Copy manifest to target
      copy:
        src: "{{ k8s_manifest + '/' if k8s_manifest is directory else k8s_manifest }}"
        dest: "/tmp/k8s-manifests-{{ ansible_date_time.epoch }}/"
      when: deploy_method == 'manifest' and k8s_manifest != ''
      register: copied_manifest

    - name: Set manifest apply path
      set_fact:
        manifest_apply_path: "{{ copied_manifest.dest | default('') }}"
      when: deploy_method == 'manifest' and copied_manifest is defined

    - name: Find manifest files (dry-run)
      shell: find {{ manifest_apply_path }} -name '*.yaml' -o -name '*.yml' | sort
      register: manifest_files_dry
      changed_when: false
      when: deploy_method == 'manifest' and k8s_manifest != '' and dry_run

    - name: Apply manifests (dry-run)
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        apply -f {{ item }}
        --namespace {{ k8s_namespace }} --dry-run=server
      loop: "{{ manifest_files_dry.stdout_lines | default([]) }}"
      when: deploy_method == 'manifest' and k8s_manifest != '' and dry_run
      register: manifest_dry_run
      ignore_errors: true

    - name: Find manifest files
      shell: find {{ manifest_apply_path }} -name '*.yaml' -o -name '*.yml' | sort
      register: manifest_files
      changed_when: false
      when: deploy_method == 'manifest' and k8s_manifest != '' and not dry_run

    - name: Apply each manifest
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        apply -f {{ item }}
        --namespace {{ k8s_namespace }}
      loop: "{{ manifest_files.stdout_lines | default([]) }}"
      register: manifest_apply
      when: deploy_method == 'manifest' and k8s_manifest != '' and not dry_run
      ignore_errors: true

    - name: Report failed manifests
      debug:
        msg: "WARNING: Failed to apply {{ item.item }}: {{ item.stderr | default('unknown error') }}"
      loop: "{{ manifest_apply.results | default([]) }}"
      when: item.rc is defined and item.rc != 0
      loop_control:
        label: "{{ item.item | default('unknown') }}"

    - name: Get deployment names
      shell: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        get deployments --namespace {{ k8s_namespace }}
        -o jsonpath='{.items[*].metadata.name}'
      register: deployment_names
      changed_when: false
      when: deploy_method == 'manifest' and not dry_run

    - name: Restart deployments to pick up secret changes
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        rollout restart deployment/{{ item }}
        --namespace {{ k8s_namespace }}
      loop: "{{ deployment_names.stdout.split() | default([]) }}"
      when: >
        deploy_method == 'manifest' and not dry_run
        and k8s_generic_secrets | length > 0
        and deployment_names.stdout | default('') | length > 0
      changed_when: true

    - name: Wait for each deployment rollout
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        rollout status deployment/{{ item }}
        --namespace {{ k8s_namespace }}
        --timeout={{ rollout_timeout }}
      loop: "{{ deployment_names.stdout.split() | default([]) }}"
      when: deploy_method == 'manifest' and not dry_run and deployment_names.stdout | default('') | length > 0
      register: rollout_status
      ignore_errors: true

    - name: Report failed rollouts
      debug:
        msg: "WARNING: Rollout failed for {{ item.item }}: {{ item.stderr | default('unknown') }}"
      loop: "{{ rollout_status.results | default([]) }}"
      when: item.rc is defined and item.rc != 0
      loop_control:
        label: "{{ item.item | default('unknown') }}"

    # --- Helm deployment ---
    - name: Verify helm is available
      command: helm version --short
      when: deploy_method == 'helm'
      register: helm_version
      changed_when: false

    - name: Helm upgrade/install (dry-run)
      command: >
        helm upgrade --install {{ helm_release }} {{ helm_chart }}
        --namespace {{ k8s_namespace }}
        --kubeconfig {{ kubeconfig_path }}
        {% if helm_values %} --values {{ helm_values }} {% endif %}
        --dry-run
      when: deploy_method == 'helm' and dry_run
      register: helm_dry_run

    - name: Show helm dry-run result
      debug:
        var: helm_dry_run.stdout_lines
      when: deploy_method == 'helm' and dry_run and helm_dry_run is defined

    - name: Helm upgrade/install
      command: >
        helm upgrade --install {{ helm_release }} {{ helm_chart }}
        --namespace {{ k8s_namespace }}
        --kubeconfig {{ kubeconfig_path }}
        {% if helm_values %} --values {{ helm_values }} {% endif %}
        --wait --timeout {{ rollout_timeout }}
      when: deploy_method == 'helm' and not dry_run
      register: helm_result

    # --- Post-deploy verification ---
    - name: Get pod status
      command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        get pods --namespace {{ k8s_namespace }}
        -o wide
      register: pod_status
      changed_when: false
      when: not dry_run

    - name: Show pod status
      debug:
        var: pod_status.stdout_lines
      when: not dry_run and pod_status is defined

    - name: Cleanup temp manifests
      file:
        path: "{{ manifest_apply_path }}"
        state: absent
      when: manifest_apply_path is defined and manifest_apply_path != ''
